name: Build

# Mirrors the local workflow in build.ps1/Containerfile: build the
# devkitARM+makerom+bannertool image, then `make cia` inside it.
#
# - push/PR: build only, upload ha3ds.cia/.3dsx as a workflow artifact
#   (Actions tab -> this run -> Artifacts) so a build is always verified
#   and grabbable without cutting a release.
# - tag push (v*): also publish a GitHub Release with the .cia attached,
#   so FBI's "Remote install" can pull it by URL.
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build builder image
        run: docker build -t ha3ds-builder -f Containerfile .

      - name: Build CIA
        run: docker run --rm -v ${{ github.workspace }}:/project ha3ds-builder make cia

      - name: Verify build outputs
        run: |
          test -f ha3ds.cia && test -f ha3ds.3dsx

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ha3ds-build
          path: |
            ha3ds.cia
            ha3ds.3dsx
          if-no-files-found: error

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
          # Piped through env instead of interpolated directly into the
          # script below - ${{ }} expressions are expanded as raw text by
          # the Actions runner before bash ever sees the script, so a ref
          # name/repo slug containing shell metacharacters would otherwise
          # be interpreted as script rather than data.
          REF_NAME: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          sudo apt-get update -qq && sudo apt-get install -y qrencode

          # Re-running this job for the same tag (workflow re-run, or a
          # tag deleted and re-pushed) would otherwise fail outright because
          # gh release create refuses to clobber an existing release.
          gh release delete "$REF_NAME" --yes || true

          # Predictable release-asset URL pattern - the assets below get
          # uploaded to exactly this path by the gh release create call
          # further down, so it's safe to reference before they exist.
          CIA_URL="https://github.com/$REPO/releases/download/$REF_NAME/ha3ds.cia"
          QR_URL="https://github.com/$REPO/releases/download/$REF_NAME/ha3ds-qr.png"

          # FBI's Remote Install can scan a QR code (camera icon in its
          # network-install menu) instead of typing the URL in by hand.
          qrencode -o ha3ds-qr.png -s 8 -m 2 "$CIA_URL"

          # Unquoted heredoc so $CIA_URL/$QR_URL expand directly - avoids a
          # separate sed pass whose `|` delimiter would collide with a `|`
          # in the URL (only possible if REF_NAME contained one, but the
          # heredoc sidesteps that entirely rather than relying on ref names
          # staying delimiter-safe).
          cat > release-notes.md <<EOF
          ## Install

          On your 3DS, open FBI, go to Remote Install, and either scan the
          QR code below with the camera icon or enter the URL manually:

          $CIA_URL

          ![QR code]($QR_URL)
          EOF

          gh release create "$REF_NAME" \
            ha3ds.cia ha3ds.3dsx ha3ds-qr.png \
            --title "$REF_NAME" \
            --notes-file release-notes.md
